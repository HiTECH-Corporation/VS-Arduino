name: Bug Report
description: Report a problem with VS Arduino
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what is going wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps that trigger the problem.
      placeholder: |
        1. Open a sketch folder
        2. Select board '...'
        3. Click 'Upload'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened instead.
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: "2026.7.1801"
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: "1.90.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: board
    attributes:
      label: Board
      placeholder: "Arduino Uno R4 WiFi"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Output log
      description: Relevant lines from the `Output > VS Arduino` channel.
      render: shell
    validations:
      required: false
